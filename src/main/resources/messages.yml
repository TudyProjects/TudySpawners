# messages.yml
# To toggle messages on/off (true/false)
enabled: true

# Message Delivery Settings
settings:
  send-to-chat: true      # Should messages be sent to chat?
  send-to-actionbar: true # Should messages be shown above the health bar (Actionbar)?

prefix: "&bTudySpawners &r"

admin:
  no-permission: "&7You don't have permission for this!"
  reload: "&aTudySpawners files and prices have been successfully reloaded!"
  give-usage: "&eUsage: /tudyspawner give <player> <type> <amount>"
  give-success: "&aGiven %amount% %type% spawner(s) to %player%."
  invalid-type: "&cInvalid mob type!"
  player-not-found: "&cPlayer not found."

spawner:
  placed: "&7Spawner successfully placed!"
  broken: "&7Spawner broken. &c%stack% Spawner"
  broken-final: "&7Spawner completely broken."
  stacked: "&7Spawner stacked! &a+%stack% Spawner"
  limit-reached: "&7You have reached the maximum spawner limit! (%limit%)"
  changed: "&aSpawner type changed to: &e%type%"
  silk-touch-required: "&cSilk Touch is required to drop the spawner!"
  cant-place-here: "&cYou cannot place a spawner here!"
  no-permission: "&cYou don't have permission to break this!"

menu:
  sell-success: "&7Sale Successful! Total: &a$%money%"
  sell-fail: "&7No valuable items to sell!"
  storage-empty: "&7Storage is empty!"
  action-cancelled: "&7Action cancelled."
  items-dropped: "&7Items in storage have been dropped on the ground."
  items-dropped-page: "&7Items on this page have been dropped on the ground."
  items-dropped-fail: "&cNo items to drop on this page."
  inventory-full: "&cInventory full! Item dropped on the ground."
  # --- NEWLY ADDED XP MESSAGES ---
  xp-collected: "&a✔ Successfully collected &e%xp% XP&a!"
  xp-empty: "&c✖ No XP to collect in storage!"

# Mob Names
mob-names:
  IRON_GOLEM: "Iron Golem"
  PIG: "Pig"
  COW: "Cow"
  ZOMBIE: "Zombie"
  SKELETON: "Skeleton"
  SPIDER: "Spider"
  CREEPER: "Creeper"
  BLAZE: "Blaze"
  ZOMBIFIED_PIGLIN: "Zombified Piglin"

# Item Names (Will appear in storage and menu)
item-names:
  IRON_INGOT: "Iron Ingot"
  POPPY: "Poppy"
  BEEF: "Raw Beef"
  LEATHER: "Leather"
  PORKCHOP: "Raw Porkchop"
  ROTTEN_FLESH: "Rotten Flesh"
  BONE: "Bone"
  ARROW: "Arrow"
  STRING: "String"
  SPIDER_EYE: "Spider Eye"
  GUNPOWDER: "Gunpowder"
  BLAZE_ROD: "Blaze Rod"
  GOLD_NUGGET: "Gold Nugget"