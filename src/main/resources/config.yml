# Veritabanı Ayarları
database:
  type: "sqlite"
  host: "localhost"
  port: 3306
  name: "minecraft"
  user: "root"
  password: ""

settings:
  autosave-interval: 600
  activation-range: 16 # Spawnerın çalışması için oyuncunun en fazla kaç blok yakınında olması gerek?
  stack-limit: 32 # Bir blokta en fazla kaç spawner üst üste birikebilir?
  spawn-interval: 25 # TAM VANILLA DENGESİ: Ortalama spawner çalışma süresi (Saniye)

# Spawner Kırma ve Düşürme Ayarları
spawner-settings:
  drop-chance: 100
  silktouch-required: true
  pickaxe-required: true
  item-name: "&dSpawner"
  item-lore:
    - "&e%type%"
  max-xp-per-spawner: 200 # 1 Spawner maksimum kaç XP biriktirebilir?
  min-mobs-per-spawn: 3 # 1 Spawner her çalıştığında en az kaç mob üretir?
  max-mobs-per-spawn: 4 # 1 Spawner her çalıştığında en fazla kaç mob üretir?

