# Menü boşluklarını dolduracak malzeme.
# Boş kalması için: AIR yazın.
fill-material: "AIR"

main-menu:
  # Başlıkta değişken kullanabilirsin
  title: "&8%stack% %type% Spawner"
  size: 27

  # Ana menüdeki info ikonunun altında çıkan depo listesinin formatı
  # %item% = Eşya adı, %amount% = Miktar
  storage-format: "&a%amount% &f%item%"

  items:
    sell-button:
      slot: 10
      material: GOLD_INGOT
      name: "&cʜᴇᴘꜱɪɴɪ ꜱᴀᴛ"
      lore:
        - "&fTüm eşyaları satmak için tıkla!"

    xp-button:
      slot: 12
      material: EXPERIENCE_BOTTLE
      name: "&a&lXP ᴛᴏᴘʟᴀ"
      lore:
        - "&7Biriken XP: &e%xp% &8/ &6%max_xp%"
        - " "
        - "&fHaznedeki XP'yi almak için tıkla!"

    info-icon:
      slot: 14
      material: SPAWNER # Varsayılan ikon
      name: "&a%stack% %type% Spawner"
      lore:
        - "&7Depo Durumu:" # Bu satırın altına otomatik liste eklenir

    storage-button:
      slot: 16
      material: DISPENSER
      name: "&aɢᴀɴɪᴍᴇᴛɪ ʏᴇʀᴇ ʙɪʀᴀᴋ"
      lore:
        - "&fSayfadaki tüm ganimetleri bırakmak için tıkla!"

confirm-menu:
  title: "&8Satışı Onayla"
  size: 27
  items:
    confirm:
      slot: 15
      material: LIME_STAINED_GLASS_PANE
      name: "&a&lONAYLA ve SAT"
      lore:
        - "&7Parayı hesabına aktar."

    cancel:
      slot: 11
      material: RED_STAINED_GLASS_PANE
      name: "&c&lİPTAL ET"
      lore:
        - "&7İşlemi iptal et."

    info:
      slot: 13
      material: PAPER
      name: "&eEmin misin?"
      lore:
        - "&7Bu işlem geri alınamaz."

storage-menu:
  title: "&8Depo Yönetimi - Sayfa %page%"
  size: 54
  # Depodaki eşyaların görünümü
  item-lore: []
  items:
    previous-page:
      slot: 48
      material: ARROW
      name: "&eÖnceki Sayfa"
    next-page:
      slot: 50
      material: ARROW
      name: "&eSonraki Sayfa"
    drop-all:
      slot: 49
      material: DISPENSER
      name: "&aᴛᴜᴍᴜɴᴜ ʏᴇʀᴇ ʙɪʀᴀᴋ"

