# menus.yml
# Material to fill empty menu slots.
# To leave empty: write AIR
fill-material: "AIR"

main-menu:
  # You can use variables in the title
  title: "&8%stack% %type% Spawner"
  size: 27

  # Format of the storage list under the info icon in the main menu
  # %item% = Item name, %amount% = Amount
  storage-format: "&a%amount% &f%item%"

  items:
    sell-button:
      slot: 10
      material: GOLD_INGOT
      name: "&cSELL ALL"
      lore:
        - "&fClick to sell all items!"

    xp-button:
      slot: 12
      material: EXPERIENCE_BOTTLE
      name: "&a&lCOLLECT XP"
      lore:
        - "&7Accumulated XP: &e%xp% &8/ &6%max_xp%"
        - " "
        - "&fClick to collect XP from the storage!"

    info-icon:
      slot: 14
      material: SPAWNER # Default icon
      name: "&a%stack% %type% Spawner"
      lore:
        - "&7Storage Status:" # Automatic list is added below this line

    storage-button:
      slot: 16
      material: DISPENSER
      name: "&aDROP LOOT"
      lore:
        - "&fClick to drop all loot on the page!"

confirm-menu:
  title: "&8Confirm Sale"
  size: 27
  items:
    confirm:
      slot: 15
      material: LIME_STAINED_GLASS_PANE
      name: "&a&lCONFIRM and SELL"
      lore:
        - "&7Transfer the money to your account."

    cancel:
      slot: 11
      material: RED_STAINED_GLASS_PANE
      name: "&c&lCANCEL"
      lore:
        - "&7Cancel the transaction."

    info:
      slot: 13
      material: PAPER
      name: "&eAre you sure?"
      lore:
        - "&7This action cannot be undone."

storage-menu:
  title: "&8Storage Management - Page %page%"
  size: 54
  # Appearance of items in storage
  item-lore: []
  items:
    previous-page:
      slot: 48
      material: ARROW
      name: "&ePrevious Page"
    next-page:
      slot: 50
      material: ARROW
      name: "&eNext Page"
    drop-all:
      slot: 49
      material: DISPENSER
      name: "&aDROP ALL"

